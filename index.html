```html
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የምርቶች ዝርዝር እና ክፍያ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 15px; margin: 0; }
        h2 { text-align: center; color: #1a1a2e; margin-bottom: 20px; }
        .product-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: auto; }
        .product-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; }
        .product-img { width: 80px; height: 80px; background: #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #666; text-align: center; }
        .product-info { flex-grow: 1; }
        .product-name { font-size: 16px; font-weight: bold; color: #333; }
        .product-price { color: #e94560; font-weight: bold; margin-top: 5px; }
        .btn-select { background-color: #1a1a2e; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-select:hover { background-color: #e94560; }
        
        /* የክፍያ አማራጭ ሳጥን */
        .payment-box { display: none; background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .payment-options { display: flex; justify-content: space-around; margin-top: 15px; }
        .pay-btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; width: 45%; }
        .cbe-btn { background-color: #7b1fa2; } /* የሲቢኢ ብር የሐምራዊ ቀለም መለያ */
        .tele-btn { background-color: #0088cc; } /* የቴሌብር ሰማያዊ ቀለም መለያ */
    </style>
</head>
<body>

<h2>የሱቃችን ምርቶች</h2>

<div class="product-list">
    <!-- ምርት 1 -->
    <div class="product-card">
        <div class="product-img">ጫማ ምስል</div>
        <div class="product-info">
            <div class="product-name">የወንዶች ጫማ</div>
            <div class="product-price">3,500 ብር</div>
        </div>
        <button class="btn-select" onclick="chooseProduct('የወንዶች ጫማ', '3,500')">ግዛ</button>
    </div>

    <!-- ምርት 2 -->
    <div class="product-card">
        <div class="product-img">ስልክ ምስል</div>
        <div class="product-info">
            <div class="product-name">ዘመናዊ ስልክ</div>
            <div class="product-price">25,000 ብር</div>
        </div>
        <button class="btn-select" onclick="chooseProduct('ዘመናዊ ስልክ', '25,000')">ግዛ</button>
    </div>
</div>

<!-- የመክፈያ አማራጭ ማሳያ ፎርም -->
<div id="payBox" class="payment-box">
    <h3 id="selectedProduct" style="color: #333;"></h3>
    <p>እባክዎ መክፈያ ዘዴ ይምረጡ፦</p>
    <div class="payment-options">
        <button class="pay-btn cbe-btn" onclick="processPayment('CBE Birr')">CBE Birr (ሲቢኢ ብር)</button>
        <button class="pay-btn tele-btn" onclick="processPayment('telebirr')">telebirr (ቴሌብር)</button>
    </div>
</div>

<script>
    var currentItem = "";
    var currentPrice = "";

    function chooseProduct(name, price) {
        currentItem = name;
        currentPrice = price;
        
        // ምርት ሲመረጥ የክፍያ ሳጥኑን ከታች ማሳያ
        document.getElementById('selectedProduct').innerText = "የተመረጠው ምርት፦ " + name + " (" + price + " ብር)";
        document.getElementById('payBox').style.display = 'block';
        
        // ገጹን ወደ ታች ዝቅ እንዲል ማድረግ
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }

    function processPayment(method) {
        alert("🎉 ጥያቄዎ ተቀባይነት አግኝቷል!\n\nበ " + method + " በኩል " + currentPrice + " ብር ለመክፈል በቀጥታ ወደ " + method + " መተግበሪያ እየተወሰዱ ነው...");
    }
</script>

</body>
</html>

```
